<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <defs>
    <filter id="fibers" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.62 0.18" numOctaves="3" seed="7" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.08
                             0 0 0 0 0.06
                             0 0 0 0 0.04
                             0 0 0 0.55 0"/>
    </filter>
    <filter id="specks" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="1" seed="13" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.10
                             0 0 0 0 0.07
                             0 0 0 0 0.05
                             0 0 0 0.30 0"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" filter="url(#fibers)"/>
  <rect width="100%" height="100%" filter="url(#specks)" opacity="0.6"/>
</svg>
