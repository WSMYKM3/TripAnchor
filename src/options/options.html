<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TripAnchor — Trips</title>
    <link rel="stylesheet" href="../popup/popup.css" />
    <style>
      /* Page-only layout. Shared component styles live in popup.css. */
      body {
        width: auto;
        max-width: 720px;
        max-height: none;
        margin: 32px auto;
        padding: 0 24px 32px;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.015em;
        margin: 0 0 4px;
      }
      .ta-page-sub {
        color: var(--muted);
        font-size: var(--ts-base);
        margin: 0 0 20px;
      }
    </style>
  </head>
  <body>
    <h1>TripAnchor</h1>
    <p class="ta-page-sub">
      Manage your trips, back up your data, and restore from a previous export.
    </p>

    <section class="ta-card">
      <h2>Trips</h2>
      <div id="ta-trip-list"></div>
      <div class="ta-bar" style="margin-top: 12px">
        <input id="ta-new-trip-name" type="text" placeholder="New trip name" />
        <button id="ta-new-trip" class="ta-primary">Create trip</button>
      </div>
    </section>

    <section class="ta-card">
      <h2>Backup</h2>
      <div class="ta-bar">
        <button id="ta-export-json" class="ta-secondary">
          Download backup (.json)
        </button>
        <label class="ta-secondary" style="cursor: pointer">
          Restore from backup
          <input
            id="ta-import-json"
            type="file"
            accept="application/json,.json"
            style="display: none"
          />
        </label>
        <span id="ta-backup-status" class="ta-status"></span>
      </div>
      <p class="ta-hint">
        Backups include every trip and place stored in this browser profile.
        Restoring replaces all current data.
      </p>
    </section>

    <section class="ta-card">
      <h2>Storage preview</h2>
      <pre id="ta-storage-preview">Loading…</pre>
    </section>

    <script type="module" src="options.js"></script>
  </body>
</html>
